name: 'Code Intelligence Check'
description: '检测代码重复实现，并在 PR 中自动评论结果'
author: 'LorryIsLuRui'

branding:
    icon: 'search'
    color: 'blue'

inputs:
    mysql-host:
        description: 'MySQL 主机地址'
        required: false
        default: ''
    mysql-port:
        description: 'MySQL 端口'
        required: false
        default: '3306'
    mysql-user:
        description: 'MySQL 用户名'
        required: false
        default: ''
    mysql-password:
        description: 'MySQL 密码'
        required: false
        default: ''
    mysql-database:
        description: 'MySQL 数据库名'
        required: false
        default: 'code_intelligence'
    mysql-enabled:
        description: '是否启用 MySQL'
        required: false
        default: 'false'
    embedding-service-url:
        description: '嵌入服务 URL'
        required: false
        default: ''
    block-threshold:
        description: '重复阻断阈值'
        required: false
        default: '0.95'
    warn-threshold:
        description: '重复警告阈值'
        required: false
        default: '0.85'
    is-mock-mode:
        description: '是否使用 mock 模式（无需 MySQL）'
        required: false
        default: 'true'

outputs:
    report-md:
        description: '重复检测报告（Markdown格式）'
        value: ${{ steps.run-check.outputs.report-md }}
    has-duplicates:
        description: '是否存在重复代码'
        value: ${{ steps.run-check.outputs.has-duplicates }}

runs:
    using: 'composite'
    steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
              fetch-depth: 0

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
              node-version: '20'
              cache: 'npm'

        - name: Install dependencies
          run: npm ci
          shell: bash

        - name: Calculate changed files
          id: changed-files
          run: |
              if [ "${{ github.event_name }}" = "pull_request" ] && [ -n "${{ github.base_ref }}" ]; then
                git fetch origin ${{ github.base_ref }} --depth=1
                git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt
              else
                git diff --name-only HEAD~1 HEAD > changed_files.txt 2>/dev/null || echo "" > changed_files.txt
              fi
              echo "changed_files=$(cat changed_files.txt | tr '\n' ',')" >> $GITHUB_OUTPUT
          shell: bash

        - name: Setup Python
          if: inputs.embedding-service-url != '' && inputs.is-mock-mode == 'false'
          uses: actions/setup-python@v5
          with:
              python-version: '3.11'

        - name: Install embedding service dependencies
          if: inputs.embedding-service-url != '' && inputs.is-mock-mode == 'false'
          run: |
              python -m pip install --upgrade pip
              pip install -r embedding-service/requirements.txt
          shell: bash

        - name: Start embedding service
          if: inputs.embedding-service-url != '' && inputs.is-mock-mode == 'false'
          run: |
              python -m uvicorn embedding-service.app:app --host 127.0.0.1 --port 8765 &
              for i in {1..30}; do
                if curl -sf http://127.0.0.1:8765/health > /dev/null; then
                  echo "embedding service ready"
                  exit 0
                fi
                sleep 1
              done
              echo "embedding service not ready"
              exit 1
          shell: bash

        - name: Run duplicate check
          id: run-check
          env:
              MYSQL_HOST: ${{ inputs.mysql-host }}
              MYSQL_PORT: ${{ inputs.mysql-port }}
              MYSQL_USER: ${{ inputs.mysql-user }}
              MYSQL_PASSWORD: ${{ inputs.mysql-password }}
              MYSQL_DATABASE: ${{ inputs.mysql-database }}
              EMBEDDING_SERVICE_URL: ${{ inputs.embedding-service-url }}
          run: |
              npm run detect-duplicates -- \
                --changed-files changed_files.txt \
                --out-json duplicate-report.json \
                --out-md duplicate-report.md \
                --block-threshold ${{ inputs.block-threshold }} \
                --warn-threshold ${{ inputs.warn-threshold }} \
                --is-mock-mode ${{ inputs.is-mock-mode }}

              # 输出报告内容
              if [ -f duplicate-report.md ]; then
                REPORT=$(cat duplicate-report.md)
                echo "report-md=$REPORT" >> $GITHUB_OUTPUT
                echo "has-duplicates=true" >> $GITHUB_OUTPUT
              else
                echo "report-md=" >> $GITHUB_OUTPUT
                echo "has-duplicates=false" >> $GITHUB_OUTPUT
              fi
          shell: bash

        - name: Comment on PR
          if: github.event_name == 'pull_request'
          env:
              GH_TOKEN: ${{ github.token }}
          run: |
              if [ -f duplicate-report.md ]; then
                BODY="$(cat duplicate-report.md)"
                gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"
              fi
          shell: bash

        - name: Comment on Commit (push to main)
          if: github.event_name == 'push' && github.ref == 'refs/heads/main'
          env:
              GH_TOKEN: ${{ github.token }}
          run: |
              if [ -f duplicate-report.md ]; then
                BODY="$(cat duplicate-report.md)"
                # 查找关联的 PR
                PR_NUMBER=$(gh pr list --search "${{ github.sha }}" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
                if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
                  gh pr comment $PR_NUMBER --body "$BODY"
                else
                  # 评论到 commit
                  gh api \
                    --method POST \
                    -H "Accept: application/vnd.github+json" \
                    /repos/${{ github.repository }}/commits/${{ github.sha }}/comments \
                    -f body="$BODY"
                fi
              fi
          shell: bash
