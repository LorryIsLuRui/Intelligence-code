# 方式一：直接内联（保留原有用法）
# 方式二：使用 Action（推荐）
# 见 .github/actions/code-intelligence-check/README.md

name: 增量索引

on:
    push:
        branches:
            - main
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    increase-index:
        runs-on: ubuntu-latest
        steps:
            - name: Run incremental index (optional)
              uses: LorryIsLuRui/code-intelligence-ci-index@v1
              with:
                  symbols-table: ${{ secrets.SYMBOLS_TABLE || 'symbols' }}
