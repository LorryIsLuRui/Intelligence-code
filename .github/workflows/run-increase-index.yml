# 方式一：直接内联（保留原有用法）
# 方式二：使用 Action（推荐）
# 见 .github/actions/code-intelligence-check/README.md

name: 重复实现检测

on:
    push:
        branches:
            - main
    pull_request:
        types: [opened, synchronize, reopened]

permissions:
    contents: read
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    duplicate-check:
        runs-on: ubuntu-latest
        steps:
            - name: Run incremental index (optional)
              uses: ./.github/actions/run-increase-index
              with:
                  mysql-host: ${{ secrets.MYSQL_HOST }}
                  mysql-port: ${{ secrets.MYSQL_PORT }}
                  mysql-user: ${{ secrets.MYSQL_USER }}
                  mysql-password: ${{ secrets.MYSQL_PASSWORD }}
                  mysql-database: ${{ secrets.MYSQL_DATABASE }}
                  mysql-symbols-table: ${{ secrets.MYSQL_SYMBOLS_TABLE || 'symbols' }}
                  is-mock-mode: 'false'

            # 推荐：使用封装好的 Action（需要发布后使用）
            # - uses: lorrylurui/code-intelligence-check@v1
