# 本地开发用 PostgreSQL 17 + pgvector（数据持久化到命名卷 intelligence-pg-data）
# 启动：docker compose up -d
# 停止：docker compose down（加 -v 可删库卷，慎用）

services:
    postgres:
        image: pgvector/pgvector:pg17
        container_name: intelligence-postgres
        restart: unless-stopped
        ports:
            - '5432:5432'
        environment:
            POSTGRES_PASSWORD: ${PG_PASSWORD:-devpassword}
            POSTGRES_DB: ${PG_DATABASE:-code_intelligence}
            POSTGRES_USER: ${PG_USER:-postgres}
        volumes:
            - intelligence-pg-data:/var/lib/postgresql/data
            - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U postgres']
            interval: 5s
            timeout: 5s
            retries: 25
            start_period: 30s

    redis:
        image: redis:7-alpine
        container_name: intelligence-redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 10

volumes:
    intelligence-pg-data:
