# 本地开发用 MySQL 8（数据持久化到命名卷 intelligence-mysql-data）
# 启动：docker compose up -d
# 停止：docker compose down（加 -v 可删库卷，慎用）

services:
    mysql:
        image: mysql:8.0
        container_name: intelligence-mysql
        restart: unless-stopped
        ports:
            - '3306:3306'
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devpassword}
            MYSQL_DATABASE: ${MYSQL_DATABASE:-code_intelligence}
        volumes:
            - intelligence-mysql-data:/var/lib/mysql
            - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
        command: >
            --character-set-server=utf8mb4
            --collation-server=utf8mb4_unicode_ci
            --default-time-zone=+08:00
        healthcheck:
            test:
                [
                    'CMD',
                    'sh',
                    '-c',
                    'mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD',
                ]
            interval: 5s
            timeout: 5s
            retries: 25
            start_period: 30s

    redis:
        image: redis:7-alpine
        container_name: intelligence-redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 5s
            timeout: 3s
            retries: 10

volumes:
    intelligence-mysql-data:
